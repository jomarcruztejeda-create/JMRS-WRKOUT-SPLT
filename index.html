<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>JMRS WORKOUT</title>
    
    <style>
        :root {
            --bg: #0f172a;       /* Deep Slate */
            --card: #1e293b;     /* Card Slate */
            --accent: #38bdf8;   /* Sky Blue */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;  /* Emerald */
            --input-bg: #334155; /* Input Field Blue */
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding-bottom: 180px;
            transition: background-color 0.6s ease;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        /* Success state for completed session */
        body.finished {
            background-color: #064e3b !important;
        }

        header {
            padding: 40px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .header-text h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-text p {
            margin: 0;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-badge {
            background: var(--accent);
            color: var(--bg);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Nav Pills */
        .nav-container {
            display: flex;
            overflow-x: auto;
            padding: 15px;
            gap: 10px;
            scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-btn {
            background: var(--card);
            color: var(--text-dim);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.2s;
        }

        .nav-btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Exercise Cards */
        #workout-list {
            padding: 0 15px;
        }

        .ex-card {
            background: var(--card);
            border-radius: 18px;
            margin-bottom: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .ex-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.2;
        }

        .reps {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Weight Input */
        .weight-input {
            background: var(--input-bg);
            border: 2px solid transparent;
            color: white;
            width: 55px;
            padding: 10px 5px;
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            margin-right: 12px;
            font-size: 1rem;
        }

        .weight-input:focus {
            outline: none;
            border-color: var(--accent);
            background: #475569;
        }

        /* Custom Checkbox */
        input[type="checkbox"] {
            width: 32px;
            height: 32px;
            appearance: none;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background: var(--success);
            border-color: var(--success);
        }

        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 20px;
            left: 7px;
            top: 2px;
            font-weight: bold;
        }

        /* Timer Bar */
        #timer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            padding: 20px 0 45px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            z-index: 200;
        }

        #timer-val {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 15px;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            align-items: center;
        }

        .start-btn {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            padding: 14px 45px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .reset-btn {
            background: var(--card);
            color: var(--text-dim);
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Modal Settings */
        #profile-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .modal-title { margin-bottom: 30px; font-weight: 800; font-size: 2rem; }
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .user-choice {
            background: var(--card);
            border: 2px solid transparent;
            padding: 30px 10px;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div id="profile-modal">
    <h1 class="modal-title">WHO IS LIFTING?</h1>
    <div class="user-grid">
        <button class="user-choice" onclick="setProfile('Jomar')">JOMAR</button>
        <button class="user-choice" style="color: var(--text-dim);" onclick="setProfile('Guest')">GUEST</button>
    </div>
</div>

<header>
    <div class="header-text">
        <p id="day-label">MONDAY</p>
        <h1 id="phase-title">PUSH & QUADS</h1>
    </div>
    <div class="profile-badge" id="user-badge">JOMAR</div>
</header>

<nav class="nav-container">
    <button class="nav-btn active" id="btn-Monday" onclick="load('Monday')">Mon</button>
    <button class="nav-btn" id="btn-Tuesday" onclick="load('Tuesday')">Tue</button>
    <button class="nav-btn" id="btn-Wednesday" onclick="load('Wednesday')">Wed</button>
    <button class="nav-btn" id="btn-Thursday" onclick="load('Thursday')">Thu</button>
    <button class="nav-btn" id="btn-Friday" onclick="load('Friday')">Fri</button>
</nav>

<div id="workout-list"></div>

<div id="timer-bar">
    <div id="timer-val">30s</div>
    <div class="controls">
        <button class="start-btn" onclick="timer()">START REST</button>
        <button class="reset-btn" onclick="resetChecks()">RESET</button>
    </div>
    <button style="background:none; border:none; color:var(--text-dim); margin-top:15px; font-size:0.75rem; text-decoration:underline;" onclick="location.reload()">Switch User</button>
</div>

<script>
    let currentUser = "Jomar";
    let currentDay = "Monday";

    const data = {
        "Monday": { title: "Push & Quads", ex: [
            {n: "Chest Press (Smith Machine)", s: "15, 12, Failure"},
            {n: "Shoulder Press", s: "15, 12, Failure"},
            {n: "Chest Fly Machine", s: "15, 12, Failure"},
            {n: "Leg Press", s: "15, 12, Failure"},
            {n: "Leg Extension", s: "15, 12, Failure"},
            {n: "Tricep Pushdown", s: "15, 12, Failure"}
        ]},
        "Tuesday": { title: "Pull & Hamstrings", ex: [
            {n: "Lat Pulldown", s: "15, 12, Failure"},
            {n: "Seated Row", s: "15, 12, Failure"},
            {n: "Rear Delt Fly", s: "15, 12, Failure"},
            {n: "Seated Leg Curl", s: "15, 12, Failure"},
            {n: "Cable Curl", s: "15, 12, Failure"},
            {n: "Wrist Curls", s: "3 Sets of 20"}
        ]},
        "Wednesday": { title: "Rest & Recovery", ex: [] },
        "Thursday": { title: "Upper Focus & Calves", ex: [
            {n: "Incline Chest Press (Smith)", s: "15, 12, Failure"},
            {n: "Lateral Raise", s: "15, 12, Failure"},
            {n: "Straight Arm Pulldown", s: "15, 12, Failure"},
            {n: "Leg Press", s: "15, 12, Failure"},
            {n: "Calf Raises", s: "15, 12, Failure"},
            {n: "Tricep Pulldowns", s: "15, 12, Failure"}
        ]},
        "Friday": { title: "Hypertrophy Mix", ex: [
            {n: "Smith Bench Press", s: "15, 12, Failure"},
            {n: "Lat Pulldown", s: "15, 12, Failure"},
            {n: "Rear Delt Fly", s: "15, 12, Failure"},
            {n: "Preacher Curl", s: "15, 12, Failure"},
            {n: "Hack Squat", s: "15, 12, Failure"},
            {n: "Leg Extension", s: "15, 12, Failure"}
        ] }
    };

    function setProfile(name) {
        currentUser = name;
        document.getElementById('user-badge').innerText = name;
        document.getElementById('profile-modal').style.display = 'none';
        load('Monday');
    }

    function load(day) {
        currentDay = day;
        document.body.classList.remove('finished');
        document.getElementById('day-label').innerText = day.toUpperCase();
        document.getElementById('phase-title').innerText = data[day].title;
        const list = document.getElementById('workout-list');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${day}`).classList.add('active');

        if (data[day].ex.length === 0) {
            list.innerHTML = `<p style="color:var(--text-dim); text-align:center; margin-top:60px; font-weight:600;">ACTIVE RECOVERY DAY.</p>`;
            return;
        }

        // Render Warmup without weight box
        let html = renderCard("Treadmill Warmup", "0.5 Miles", true);
        data[day].ex.forEach(ex => html += renderCard(ex.n, ex.s, false));
        list.innerHTML = html;
        restoreData();
    }

    function renderCard(name, reps, isWarmup) {
        const storageKey = `${currentUser}-${currentDay}-${name.replace(/\s/g, '')}`;
        return `
            <div class="ex-card">
                <div class="ex-info">
                    <span class="name">${name}</span>
                    <span class="reps">${reps}</span>
                </div>
                ${!isWarmup ? `<input type="number" class="weight-input" placeholder="LBS" id="w-${storageKey}" oninput="saveWeight('${storageKey}')">` : ''}
                <input type="checkbox" id="c-${storageKey}" onclick="saveCheck('${storageKey}')">
            </div>
        `;
    }

    function saveWeight(key) {
        localStorage.setItem(`w-${key}`, document.getElementById(`w-${key}`).value);
    }

    function saveCheck(key) {
        localStorage.setItem(`c-${key}`, document.getElementById(`c-${key}`).checked);
        checkCompletion();
    }

    function restoreData() {
        document.querySelectorAll('input').forEach(input => {
            const saved = localStorage.getItem(input.id);
            if (input.type === "checkbox") {
                input.checked = (saved === "true");
            } else {
                input.value = saved || "";
            }
        });
        checkCompletion();
    }

    function checkCompletion() {
        const boxes = document.querySelectorAll('input[type="checkbox"]');
        const allChecked = Array.from(boxes).every(b => b.checked);
        document.body.classList.toggle('finished', allChecked && boxes.length > 0);
    }

    function resetChecks() {
        if(confirm("Clear checks for this session? Weights will be kept.")) {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => {
                if (c.id.includes(currentDay)) {
                    c.checked = false;
                    localStorage.removeItem(c.id);
                }
            });
            document.body.classList.remove('finished');
        }
    }

    function timer() {
        let time = 30;
        const display = document.getElementById('timer-val');
        const clock = setInterval(() => {
            time--;
            display.innerText = time + "s";
            if (time <= 0) {
                clearInterval(clock);
                display.innerText = "GO";
                
                // Audio Beep
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(550, context.currentTime);
                osc.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.15);

                // Haptic feedback
                if(window.navigator.vibrate) window.navigator.vibrate(200);
            }
        }, 1000);
    }
</script>
</body>
</html>
