<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Phone App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>JMRS WRKOUT SPLT</title>
    
    <style>
        :root {
            --bg: #000000;
            --card: #1a1a1a;
            --red: #ff0000;
            --dark-red: #4a0000;
            --text: #ffffff;
            --silver: #c0c0c0;
            --glass: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.4) 100%);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: "Impact", "Arial Narrow", sans-serif;
            margin: 0;
            padding-bottom: 180px;
            transition: background-color 1s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Pulsing Red Finish State (No Text) */
        body.finished {
            background-color: var(--dark-red) !important;
            animation: finish-pulse 2.5s infinite alternate;
        }

        @keyframes finish-pulse {
            from { background-color: #200000; }
            to { background-color: #600000; }
        }

        header {
            text-align: center;
            padding: 30px 10px;
            background: linear-gradient(180deg, #444 0%, #000 100%);
            border-bottom: 3px solid var(--red);
            box-shadow: 0px 5px 15px rgba(255, 0, 0, 0.4);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            color: var(--red);
            text-shadow: 2px 2px 0px #000, 0 0 10px var(--red);
            font-style: italic;
            letter-spacing: 2px;
        }

        .nav-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            background: #111;
            border-bottom: 2px solid var(--red);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
            background: #222;
            background-image: var(--glass);
            color: var(--silver);
            border: 1px solid #000;
            padding: 14px 2px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .nav-btn.active { 
            background: var(--red); 
            color: #fff; 
            box-shadow: inset 0 0 10px #000;
        }

        #workout-list {
            max-width: 600px;
            margin: 15px auto;
            padding: 0 10px;
        }

        .ex-card {
            background: var(--card);
            background-image: linear-gradient(135deg, #222 0%, #111 100%);
            border: 2px solid #333;
            border-left: 6px solid var(--red);
            margin-bottom: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            box-shadow: 5px 5px 0px rgba(0,0,0,1);
        }

        input[type="checkbox"] {
            width: 34px;
            height: 34px;
            appearance: none;
            background: #000;
            border: 2px solid var(--red);
            border-radius: 2px;
            position: relative;
            cursor: pointer;
            margin-right: 15px;
            box-shadow: inset 0 0 5px var(--red);
        }

        input[type="checkbox"]:checked::before {
            content: "X";
            color: var(--red);
            position: absolute;
            left: 6px; top: -4px;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 10px var(--red);
        }

        .name { font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }
        .reps { color: var(--red); font-size: 0.85rem; font-family: "Courier New", monospace; margin-top: 3px; font-weight: bold; }

        #timer-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: linear-gradient(0deg, #000 0%, #222 100%);
            border-top: 4px solid var(--red);
            padding: 20px 0;
            text-align: center;
            z-index: 200;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }

        #timer-val { 
            font-size: 4.5rem; 
            color: var(--red); 
            font-family: "Courier New", monospace;
            text-shadow: 0 0 15px var(--red);
            margin-bottom: 10px;
            line-height: 1;
        }

        .start-btn {
            background: var(--red);
            background-image: var(--glass);
            color: white;
            padding: 14px 50px;
            font-weight: bold;
            border-radius: 50px;
            border: 2px solid #800;
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #500;
            text-shadow: 1px 1px #000;
        }

        .start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #500;
        }

        .reset-link {
            background: transparent;
            color: #555;
            border: none;
            text-decoration: underline;
            font-size: 0.8rem;
            margin-top: 15px;
            display: block;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>JMRS WRKOUT SPLT</h1>
</header>

<div class="nav-container">
    <button class="nav-btn" id="btn-Monday" onclick="load('Monday')">PUSH</button>
    <button class="nav-btn" id="btn-Tuesday" onclick="load('Tuesday')">PULL</button>
    <button class="nav-btn" id="btn-Wednesday" onclick="load('Wednesday')">REST</button>
    <button class="nav-btn" id="btn-Thursday" onclick="load('Thursday')">LEGS</button>
    <button class="nav-btn" id="btn-Friday" onclick="load('Friday')">HYPER</button>
</div>

<div id="workout-list"></div>

<div id="timer-bar">
    <div id="timer-val">30S</div>
    <button class="start-btn" onclick="timer()">START REST</button>
    <button class="reset-link" onclick="resetChecks()">RESET SESSION DATA</button>
</div>

<script>
    const data = {
        "Monday": [
            {n: "Chest Press (Machine)", s: "15, 12, FAILURE"},
            {n: "Incline Chest Press", s: "15, 12, FAILURE"},
            {n: "Shoulder Press", s: "15, 12, FAILURE"},
            {n: "Lateral Raise", s: "3 SETS OF 10"},
            {n: "Tricep Pushdowns", s: "15, 12, FAILURE"},
            {n: "Tricep Pulldowns", s: "15, 12, FAILURE"}
        ],
        "Tuesday": [
            {n: "Lat Pulldown", s: "15, 12, FAILURE"},
            {n: "Seated Row", s: "15, 12, FAILURE"},
            {n: "Straight Arm Pulldown", s: "15, 12, FAILURE"},
            {n: "Rear Delt Fly", s: "3 SETS OF 15"},
            {n: "Cable Curl", s: "15, 12, FAILURE"},
            {n: "Preacher Curl", s: "15, 12, FAILURE"}
        ],
        "Wednesday": [], 
        "Thursday": [
            {n: "Leg Press", s: "15, 12, FAILURE"},
            {n: "Leg Extension", s: "15, 12, FAILURE"},
            {n: "Seated Leg Curl", s: "15, 12, FAILURE"},
            {n: "Abductor Machine", s: "15, 12, FAILURE"},
            {n: "Adductor Machine", s: "15, 12, FAILURE"},
            {n: "Calf Raises", s: "3 SETS OF 12"}
        ],
        "Friday": [
            {n: "Smith Bench Press", s: "15, 12, FAILURE"},
            {n: "Lat Pulldown (Neutral)", s: "15, 12, FAILURE"},
            {n: "Chest Fly Machine", s: "15, 12, FAILURE"},
            {n: "Seated Row", s: "15, 12, FAILURE"},
            {n: "Lateral Raise", s: "3 SETS OF 12"},
            {n: "Bicep Curl", s: "15, 12, FAILURE"},
            {n: "Tricep Pulldowns", s: "15, 12, FAILURE"}
        ]
    };

    let currentDay = "Monday";

    function load(day) {
        currentDay = day;
        document.body.classList.remove('finished');
        const list = document.getElementById('workout-list');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${day}`).classList.add('active');

        if (day === "Wednesday") {
            list.innerHTML = `<h2 style="text-align:center; color:#555; margin-top:60px; font-style:italic;">RECOVERY MODE</h2>`;
            return;
        }

        let html = `<h2 style="border-left:5px solid var(--red); padding-left:12px; margin-bottom:20px; font-style:italic;">${day.toUpperCase()} PHASE</h2>`;
        html += renderCard("TREADMILL WARMUP", "0.5 MILES");
        data[day].forEach(ex => html += renderCard(ex.n, ex.s));
        list.innerHTML = html;
        restoreChecks();
    }

    function renderCard(name, reps) {
        const id = `jmrs-${currentDay}-${name.replace(/\s/g, '')}`;
        return `
            <div class="ex-card">
                <input type="checkbox" id="${id}" onclick="saveCheck('${id}')">
                <div><div class="name">${name}</div><div class="reps">${reps}</div></div>
            </div>
        `;
    }

    function saveCheck(id) {
        const checkbox = document.getElementById(id);
        localStorage.setItem(id, checkbox.checked);
        checkCompletion();
    }

    function checkCompletion() {
        const boxes = document.querySelectorAll('input[type="checkbox"]');
        const allChecked = Array.from(boxes).every(b => b.checked);
        if (allChecked && boxes.length > 0) {
            document.body.classList.add('finished');
        } else {
            document.body.classList.remove('finished');
        }
    }

    function restoreChecks() {
        document.querySelectorAll('input[type="checkbox"]').forEach(c => {
            if (localStorage.getItem(c.id) === "true") c.checked = true;
        });
        checkCompletion();
    }

    function resetChecks() {
        if(confirm("WIPE PROGRESS FOR TODAY?")) {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => {
                c.checked = false;
                localStorage.removeItem(c.id);
            });
            document.body.classList.remove('finished');
        }
    }

    function timer() {
        let time = 30;
        const display = document.getElementById('timer-val');
        const clock = setInterval(() => {
            time--;
            display.innerText = time + "S";
            if (time <= 0) {
                clearInterval(clock);
                display.innerText = "LIFT";
                
                // Retro Square Wave Beep
                try {
                    const context = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = context.createOscillator();
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(440, context.currentTime);
                    osc.connect(context.destination);
                    osc.start();
                    osc.stop(context.currentTime + 0.15);
                } catch(e) { console.log("Audio play blocked"); }
            }
        }, 1000);
    }
    
    load('Monday');
</script>
</body>
</html>
