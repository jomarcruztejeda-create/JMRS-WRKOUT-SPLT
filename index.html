<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JMRS WRKOUT</title>
    
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --input-bg: #0f172a;
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            padding-bottom: calc(200px + var(--safe-bottom));
            transition: background 0.6s ease;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }

        body.finished { background-color: #064e3b !important; }

        header {
            padding: 60px 25px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-text h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }
        .header-text p { margin: 0; color: var(--accent); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }

        .profile-badge {
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        /* Progress Bar */
        #progress-wrap {
            height: 4px;
            background: rgba(255,255,255,0.05);
            margin: 0 25px 10px;
            border-radius: 2px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px var(--accent);
        }

        /* Nav Pills */
        .nav-container {
            display: flex;
            overflow-x: auto;
            padding: 10px 20px;
            gap: 10px;
            scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-btn {
            background: var(--card);
            color: var(--text-dim);
            border: none;
            padding: 10px 22px;
            border-radius: 14px;
            font-weight: 600;
            white-space: nowrap;
            font-size: 0.9rem;
        }
        .nav-btn.active { background: var(--text-main); color: var(--bg); }

        /* Exercise Cards */
        #workout-list { padding: 0 20px; }

        .ex-card {
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .ex-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .name { font-size: 1.05rem; font-weight: 600; color: var(--text-main); line-height: 1.2; }
        .reps { font-size: 0.85rem; color: var(--text-dim); }

        /* Inputs */
        .weight-input {
            background: var(--input-bg);
            border: 1.5px solid transparent;
            color: white;
            width: 60px;
            padding: 12px 0;
            border-radius: 12px;
            text-align: center;
            font-weight: 700;
            margin-right: 15px;
            font-size: 1rem;
        }
        .weight-input:focus { border-color: var(--accent); outline: none; }

        input[type="checkbox"] {
            width: 32px;
            height: 32px;
            appearance: none;
            background: rgba(255,255,255,0.05);
            border: 2px solid #475569;
            border-radius: 10px;
            position: relative;
            flex-shrink: 0;
        }
        input[type="checkbox"]:checked { background: var(--success); border-color: var(--success); }
        input[type="checkbox"]:checked::after {
            content: "✓"; position: absolute; color: white; font-size: 20px; left: 7px; top: 2px; font-weight: 900;
        }

        /* Bottom Controls */
        #timer-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 0 calc(30px + var(--safe-bottom));
            border-top: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            z-index: 100;
        }

        #timer-val { font-size: 3.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 15px; letter-spacing: -2px; }

        .controls { display: flex; justify-content: center; gap: 12px; padding: 0 20px; }
        .start-btn { flex: 2; background: var(--text-main); color: var(--bg); border: none; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 1rem; text-transform: uppercase; }
        .reset-btn { flex: 1; background: var(--card); color: var(--text-dim); border: none; padding: 16px; border-radius: 16px; font-weight: 600; font-size: 0.8rem; }

        /* Modal */
        #profile-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; max-width: 400px; }
        .user-choice { background: var(--card); border: 2px solid transparent; padding: 40px 10px; border-radius: 24px; color: white; font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="profile-modal">
    <h1 style="margin-bottom:40px; font-weight:900;">SELECT USER</h1>
    <div class="user-grid">
        <button class="user-choice" onclick="setProfile('Jomar')">JOMAR</button>
        <button class="user-choice" style="background:#111; color:#444;" onclick="setProfile('Guest')">GUEST</button>
    </div>
</div>

<header>
    <div class="header-text">
        <p id="day-label">LOADING</p>
        <h1 id="phase-title">...</h1>
    </div>
    <div class="profile-badge" id="user-badge">...</div>
</header>

<div id="progress-wrap"><div id="progress-bar"></div></div>

<nav class="nav-container">
    <button class="nav-btn active" id="btn-Monday" onclick="load('Monday')">Mon</button>
    <button class="nav-btn" id="btn-Tuesday" onclick="load('Tuesday')">Tue</button>
    <button class="nav-btn" id="btn-Wednesday" onclick="load('Wednesday')">Wed</button>
    <button class="nav-btn" id="btn-Thursday" onclick="load('Thursday')">Thu</button>
    <button class="nav-btn" id="btn-Friday" onclick="load('Friday')">Fri</button>
</nav>

<div id="workout-list"></div>

<div id="timer-bar">
    <div id="timer-val">30s</div>
    <div class="controls">
        <button class="start-btn" onclick="timer()">Start Rest</button>
        <button class="reset-btn" onclick="resetChecks()">Reset</button>
    </div>
    <button style="background:none; border:none; color:var(--text-dim); margin-top:20px; font-size:0.8rem;" onclick="location.reload()">Change User</button>
</div>

<script>
    let currentUser = "Jomar";
    let currentDay = "Monday";

    const data = {
        "Monday": { title: "Push & Quads", ex: [
            {n: "Chest Press (Smith)", s: "15, 12, Failure"},
            {n: "Shoulder Press", s: "15, 12, Failure"},
            {n: "Chest Fly Machine", s: "15, 12, Failure"},
            {n: "Leg Press", s: "15, 12, Failure"},
            {n: "Leg Extension", s: "15, 12, Failure"},
            {n: "Tricep Pushdown", s: "15, 12, Failure"}
        ]},
        "Tuesday": { title: "Pull & Hamstrings", ex: [
            {n: "Lat Pulldown", s: "15, 12, Failure"},
            {n: "Seated Row", s: "15, 12, Failure"},
            {n: "Rear Delt Fly", s: "15, 12, Failure"},
            {n: "Seated Leg Curl", s: "15, 12, Failure"},
            {n: "Cable Curl", s: "15, 12, Failure"},
            {n: "Wrist Curls", s: "3 Sets of 20"}
        ]},
        "Wednesday": { title: "Rest & Recovery", ex: [] },
        "Thursday": { title: "Upper & Calves", ex: [
            {n: "Incline Press (Smith)", s: "15, 12, Failure"},
            {n: "Lateral Raise", s: "15, 12, Failure"},
            {n: "Straight Arm Pulldown", s: "15, 12, Failure"},
            {n: "Leg Press", s: "15, 12, Failure"},
            {n: "Calf Raises", s: "15, 12, Failure"},
            {n: "Tricep Pulldowns", s: "15, 12, Failure"}
        ]},
        "Friday": { title: "Hypertrophy Mix", ex: [
            {n: "Smith Bench Press", s: "15, 12, Failure"},
            {n: "Lat Pulldown", s: "15, 12, Failure"},
            {n: "Rear Delt Fly", s: "15, 12, Failure"},
            {n: "Preacher Curl", s: "15, 12, Failure"},
            {n: "Hack Squat", s: "15, 12, Failure"},
            {n: "Leg Extension", s: "15, 12, Failure"}
        ]}
    };

    function setProfile(name) {
        currentUser = name;
        document.getElementById('user-badge').innerText = name;
        document.getElementById('profile-modal').style.display = 'none';
        load('Monday');
    }

    function load(day) {
        currentDay = day;
        document.body.classList.remove('finished');
        document.getElementById('day-label').innerText = day.toUpperCase();
        document.getElementById('phase-title').innerText = data[day].title;
        const list = document.getElementById('workout-list');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${day}`).classList.add('active');

        if (data[day].ex.length === 0) {
            list.innerHTML = `<p style="color:var(--text-dim); text-align:center; margin-top:60px;">RECOVERY DAY</p>`;
            updateProgress(0);
            return;
        }

        let html = renderCard("Treadmill Warmup", "0.5 Miles", true);
        data[day].ex.forEach(ex => html += renderCard(ex.n, ex.s, false));
        list.innerHTML = html;
        restoreData();
    }

    function renderCard(name, reps, isWarmup) {
        const key = `${currentUser}-${currentDay}-${name.replace(/\s/g, '')}`;
        return `
            <div class="ex-card">
                <div class="ex-info">
                    <span class="name">${name}</span>
                    <span class="reps">${reps}</span>
                </div>
                ${!isWarmup ? `<input type="number" class="weight-input" placeholder="LBS" id="w-${key}" oninput="localStorage.setItem('w-${key}', this.value)">` : ''}
                <input type="checkbox" id="c-${key}" onclick="saveCheck('${key}')">
            </div>
        `;
    }

    function saveCheck(key) {
        localStorage.setItem(`c-${key}`, document.getElementById(`c-${key}`).checked);
        updateProgress();
    }

    function restoreData() {
        document.querySelectorAll('input').forEach(input => {
            const saved = localStorage.getItem(input.id);
            if (input.type === "checkbox") input.checked = (saved === "true");
            else input.value = saved || "";
        });
        updateProgress();
    }

    function updateProgress() {
        const boxes = document.querySelectorAll('input[type="checkbox"]');
        const checked = Array.from(boxes).filter(b => b.checked).length;
        const percent = (checked / boxes.length) * 100 || 0;
        document.getElementById('progress-bar').style.width = percent + "%";
        document.body.classList.toggle('finished', percent === 100 && boxes.length > 0);
    }

    function resetChecks() {
        if(confirm("Start fresh session? (Weights saved)")) {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => {
                c.checked = false;
                localStorage.removeItem(c.id);
            });
            updateProgress();
        }
    }

    function timer() {
        let time = 30;
        const display = document.getElementById('timer-val');
        const clock = setInterval(() => {
            time--; display.innerText = time + "s";
            if (time <= 0) {
                clearInterval(clock); display.innerText = "GO";
                try {
                    const ctx = new AudioContext();
                    const o = ctx.createOscillator();
                    o.connect(ctx.destination);
                    o.start(); o.stop(ctx.currentTime + 0.1);
                } catch(e) {}
            }
        }, 1000);
    }
</script>
</body>
</html>
