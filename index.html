<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>JMRS WORKOUT</title>
    
    <style>
        :root {
            --bg: #0f172a;       /* Deep Slate Blue */
            --card: #1e293b;     /* Slate Grey */
            --accent: #38bdf8;   /* Sky Blue */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding-bottom: 160px;
            transition: background-color 0.5s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* Clean Finish State */
        body.finished {
            background-color: #064e3b !important; /* Deep Emerald */
        }

        header {
            padding: 40px 20px 20px;
            text-align: left;
        }

        header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        header p {
            margin: 5px 0 0;
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-container {
            display: flex;
            overflow-x: auto;
            padding: 0 15px;
            gap: 10px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-btn {
            background: var(--card);
            color: var(--text-dim);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.2s;
        }

        .nav-btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        #workout-list {
            padding: 0 20px;
        }

        .ex-card {
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .ex-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .reps {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Modern Checkbox */
        .check-container {
            position: relative;
            width: 32px;
            height: 32px;
        }

        input[type="checkbox"] {
            width: 32px;
            height: 32px;
            appearance: none;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--text-dim);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        input[type="checkbox"]:checked {
            background: var(--success);
            border-color: var(--success);
        }

        input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            color: white;
            font-size: 20px;
            left: 7px;
            top: 2px;
        }

        #timer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 0 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        #timer-val {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 15px;
            font-variant-numeric: tabular-nums;
        }

        .start-btn {
            background: var(--text-main);
            color: var(--bg);
            border: none;
            padding: 14px 40px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.2s;
        }

        .start-btn:active { transform: scale(0.95); }

        .reset-link {
            display: block;
            margin-top: 15px;
            color: var(--text-dim);
            font-size: 0.75rem;
            background: none;
            border: none;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<header>
    <p id="day-label">MONDAY</p>
    <h1 id="phase-title">PUSH & QUADS</h1>
</header>

<div class="nav-container">
    <button class="nav-btn active" id="btn-Monday" onclick="load('Monday')">Monday</button>
    <button class="nav-btn" id="btn-Tuesday" onclick="load('Tuesday')">Tuesday</button>
    <button class="nav-btn" id="btn-Wednesday" onclick="load('Wednesday')">Wednesday</button>
    <button class="nav-btn" id="btn-Thursday" onclick="load('Thursday')">Thursday</button>
    <button class="nav-btn" id="btn-Friday" onclick="load('Friday')">Friday</button>
</div>

<div id="workout-list"></div>

<div id="timer-bar">
    <div id="timer-val">30s</div>
    <button class="start-btn" onclick="timer()">START REST</button>
    <button class="reset-link" onclick="resetChecks()">Reset Session</button>
</div>

<script>
    const data = {
        "Monday": { title: "Push & Quads", ex: [
            {n: "Chest Press (Smith Machine)", s: "15, 12, Failure"},
            {n: "Shoulder Press", s: "15, 12, Failure"},
            {n: "Chest Fly Machine", s: "15, 12, Failure"},
            {n: "Leg Press", s: "15, 12, Failure"},
            {n: "Leg Extension", s: "15, 12, Failure"},
            {n: "Tricep Pushdown", s: "15, 12, Failure"}
        ]},
        "Tuesday": { title: "Pull & Hamstrings", ex: [
            {n: "Lat Pulldown", s: "15, 12, Failure"},
            {n: "Seated Row", s: "15, 12, Failure"},
            {n: "Rear Delt Fly", s: "15, 12, Failure"},
            {n: "Seated Leg Curl", s: "15, 12, Failure"},
            {n: "Cable Curl", s: "15, 12, Failure"},
            {n: "Wrist Curls", s: "3 Sets of 20"}
        ]},
        "Wednesday": { title: "Recovery", ex: [] },
        "Thursday": { title: "Upper Focus & Calves", ex: [
            {n: "Incline Chest Press (Smith Machine)", s: "15, 12, Failure"},
            {n: "Lateral Raise", s: "15, 12, Failure"},
            {n: "Straight Arm Pulldown", s: "15, 12, Failure"},
            {n: "Leg Press", s: "15, 12, Failure"},
            {n: "Calf Raises", s: "15, 12, Failure"},
            {n: "Tricep Pulldowns", s: "15, 12, Failure"}
        ]},
        "Friday": { title: "Hypertrophy Mix", ex: [
            {n: "Smith Bench Press", s: "15, 12, Failure"},
            {n: "Lat Pulldown", s: "15, 12, Failure"},
            {n: "Rear Delt Fly", s: "15, 12, Failure"},
            {n: "Preacher Curl", s: "15, 12, Failure"},
            {n: "Hack Squat", s: "15, 12, Failure"},
            {n: "Leg Extension", s: "15, 12, Failure"}
        ]}
    };

    let currentDay = "Monday";

    function load(day) {
        currentDay = day;
        document.body.classList.remove('finished');
        
        document.getElementById('day-label').innerText = day.toUpperCase();
        document.getElementById('phase-title').innerText = data[day].title;

        const list = document.getElementById('workout-list');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${day}`).classList.add('active');

        if (data[day].ex.length === 0) {
            list.innerHTML = `<p style="color:var(--text-dim); text-align:center; margin-top:40px;">Active recovery today. Keep moving.</p>`;
            return;
        }

        let html = '';
        // Add warmup to every day
        html += renderCard("Treadmill Warmup", "0.5 Miles");
        data[day].ex.forEach(ex => html += renderCard(ex.n, ex.s));
        list.innerHTML = html;
        restoreChecks();
    }

    function renderCard(name, reps) {
        const id = `slate-${currentDay}-${name.replace(/\s/g, '')}`;
        return `
            <div class="ex-card">
                <div class="ex-info">
                    <span class="name">${name}</span>
                    <span class="reps">${reps}</span>
                </div>
                <div class="check-container">
                    <input type="checkbox" id="${id}" onclick="saveCheck('${id}')">
                </div>
            </div>
        `;
    }

    function saveCheck(id) {
        localStorage.setItem(id, document.getElementById(id).checked);
        checkCompletion();
    }

    function checkCompletion() {
        const boxes = document.querySelectorAll('input[type="checkbox"]');
        const allChecked = Array.from(boxes).every(b => b.checked);
        if (allChecked && boxes.length > 0) {
            document.body.classList.add('finished');
        } else {
            document.body.classList.remove('finished');
        }
    }

    function restoreChecks() {
        document.querySelectorAll('input[type="checkbox"]').forEach(c => {
            if (localStorage.getItem(c.id) === "true") c.checked = true;
        });
        checkCompletion();
    }

    function resetChecks() {
        if(confirm("Reset progress?")) {
            document.querySelectorAll('input[type="checkbox"]').forEach(c => {
                c.checked = false;
                localStorage.removeItem(c.id);
            });
            document.body.classList.remove('finished');
        }
    }

    function timer() {
        let time = 30;
        const display = document.getElementById('timer-val');
        const clock = setInterval(() => {
            time--;
            display.innerText = time + "s";
            if (time <= 0) {
                clearInterval(clock);
                display.innerText = "GO";
                // Modern Soft Beep
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(660, context.currentTime);
                osc.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.2);
                if(window.navigator.vibrate) window.navigator.vibrate(200);
            }
        }, 1000);
    }
    
    load('Monday');
</script>
</body>
</html>
